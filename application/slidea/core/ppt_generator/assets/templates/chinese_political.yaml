description: |-
    适合宣传爱国主义、党员活动时、政治学习时采用的排版样式风格，红色风格。（也适用于华为风格）
html: |-
    <!DOCTYPE html>
    <html lang="zh-CN">
    <head>
        <meta charset="utf-8"/>
        <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
        <title>总结与展望</title>
        <script src="https://cdn.jsdmirror.com/npm/tailwindcss-cdn@3.4.10/tailwindcss.js"></script>
        <link href="https://fonts.googleapis.cn/css2?family=Noto+Sans+SC:wght@400;700&amp;display=swap"
              rel="stylesheet"/>
        <script defer src="https://cdn.jsdelivr.net.cn/npm/@fortawesome/fontawesome-free@6.4.0/js/all.min.js"></script>
        <script src="https://cdn.jsdelivr.net.cn/npm/chart.js"></script>
        <style>
            body, html {
                font-family: 'Noto Sans SC', sans-serif;
                margin: 0;
                padding: 0;
                background-color: #ffffff;
            }

            html:lang(zh-CN),
            html:lang(zh-Hans) {
                font-family: 'Noto Sans SC', sans-serif;
            }
    
            #ppt-container {
                width: 1280px;
                height: 720px;
                display: flex;
                flex-direction: column;
                overflow: hidden;
                background-color: white;
            }
    
            .section-container {
                min-height: 0;
                min-width: 0;
                padding: 0 45px;
                display: flex;
                flex-direction: column;
                flex-grow: 1;
            }
    
            .scalable-content {
                width: 100%;
                height: 100%; 
                flex-grow: 1;
                display: flex;
                flex-direction: column;
                justify-content: center;
                transform-origin: top left;
            }
    
            .header {
                height: 100px;
                padding: 20px 45px;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }
    
            .footer {
                height: 50px;
                padding: 10px 45px;
                display: flex;
                justify-content: flex-end;
                align-items: center;
            }
    
            .main-title {
                font-size: 2.2rem;
                font-weight: 800;
                color: #C00000;
                display: inline-block;
                margin: 0;
                padding-bottom: 0.5rem;
                border-bottom: 4px solid #C00000;
            }
    
            .highlight {
                color: #C00000;
                font-weight: 700;
            }
    
            .bg-red-light {
                background-color: #fff1f1;
            }
    
            .border-red-main {
                border-color: #C00000;
            }
    
            .text-red-main {
                color: #C00000;
            }
    
            .list-marker {
                width: 42px;
                height: 42px;
                background-color: #fde8e8;
                color: #C00000; /* 图标使用品牌红 */
                border-radius: 10px; /* 现代感的圆角，不一定是正圆 */
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 1.2rem;
                flex-shrink: 0;
                transition: all 0.3s ease;
                border: 1px solid #f4caca;
            }
        </style>
    </head>
    <body>
    <div id="ppt-container">
    
        <!-- 头部 -->
        <header class="header">
            <h1 class="main-title">总结与展望</h1>
        </header>
    
        <div class="section-container">
            <div class="scalable-content">
                <div class="w-full flex space-x-12 h-full">
    
                    <!-- 左侧：核心结论 -->
                    <div class="h-full flex-1 flex flex-col">
                        <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center">
                            <i class="fas fa-clipboard-check text-red-main mr-3"></i>核心结论
                        </h2>
                        <div class="flex-1 flex flex-col justify-around">
                            <p class="text-lg text-gray-700 leading-relaxed mb-6">
                                Android 虚拟屏技术架构<span class="highlight">完全具备</span>支撑 GUI Agent
                                在后台独立运行与控制的能力，是实现非侵入式自动化的关键路径。
                            </p>
    
                            <!-- 关键要素卡片 -->
                            <div class="mb-8">
                                <h3 class="text-m font-bold text-gray-600 mb-4">攻克三大关键技术难点：</h3>
                                <div class="flex justify-between space-x-4">
                                    <div class="flex-1 bg-gray-50 p-4 rounded text-center border border-gray-200">
                                        <i class="fas fa-shield-alt text-3xl text-gray-600 mb-2"></i>
                                        <div class="font-bold text-gray-800 mb-1">系统权限</div>
                                        <div class="text-xs text-gray-500">System Permissions</div>
                                    </div>
                                    <div class="flex-1 bg-gray-50 p-4 rounded text-center border border-gray-200">
                                        <i class="fas fa-clone text-3xl text-gray-600 mb-2"></i>
                                        <div class="font-bold text-gray-800 mb-1">Multi-Resume</div>
                                        <div class="text-xs text-gray-500">多屏保活机制</div>
                                    </div>
                                    <div class="flex-1 bg-gray-50 p-4 rounded text-center border border-gray-200">
                                        <i class="fas fa-hand-pointer text-3xl text-gray-600 mb-2"></i>
                                        <div class="font-bold text-gray-800 mb-1">输入注入</div>
                                        <div class="text-xs text-gray-500">Input Injection</div>
                                    </div>
                                </div>
                            </div>
    
                            <!-- 最佳实践建议 -->
                            <div class="bg-red-light p-6 rounded border-l-8 border-red-main">
                                <h3 class="text-lg font-bold text-red-main mb-2">
                                    <i class="fas fa-star mr-2"></i>最佳方案选择
                                </h3>
                                <p class="text-m text-gray-800">
                                    鉴于普通应用在虚拟屏创建和输入注入上的严格限制，<span
                                        class="highlight">系统应用 (System App)</span> 是目前实现全功能 GUI Agent 的最佳工程选择。
                                </p>
                            </div>
                        </div>
                    </div>
    
                    <!-- 右侧：未来展望 -->
                    <div class="h-full flex-1 flex flex-col">
                        <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center">
                            <i class="fas fa-binoculars text-red-main mr-3"></i>未来展望
                        </h2>
    
                        <div class="h-full flex-1 flex flex-col justify-around">
    
                            <!-- 图片素材 -->
                            <div class="w-full mb-8">
                                <img src="images/6cab708fa289b77ea12333f1978bbb90.png" alt="Android 14 Future"
                                     class="w-full h-auto object-contain max-h-56 rounded border border-gray-200">
                            </div>
    
                            <div class="flex-1 flex flex-col justify-around">
                                <!-- 展望点 1 -->
                                <div class="flex items-start">
                                    <div class="list-marker mr-4">
                                        <i class="fas fa-laptop-code"></i>
                                    </div>
                                    <div>
                                        <h4 class="text-lg font-bold text-gray-800 mb-1">系统 API 演进 (Android 14+)</h4>
                                        <p class="text-gray-600 text-m">系统可能进一步开放虚拟屏与多窗口管理
                                            API，降低非系统级应用的实现门槛。</p>
                                    </div>
                                </div>
    
                                <!-- 展望点 2 -->
                                <div class="flex items-start">
                                    <div class="list-marker mr-4">
                                        <i class="fas fa-sliders-h"></i>
                                    </div>
                                    <div>
                                        <h4 class="text-lg font-bold text-gray-800 mb-1">厂商定制化支持</h4>
                                        <p class="text-gray-600 text-m">各厂商 ROM
                                            可能针对“后台自动化”场景推出特定的特权模式或管控接口。</p>
                                    </div>
                                </div>
    
                                <!-- 展望点 3 -->
                                <div class="flex items-start">
                                    <div class="list-marker mr-4">
                                        <i class="fas fa-brain"></i>
                                    </div>
                                    <div>
                                        <h4 class="text-lg font-bold text-gray-800 mb-1">AI Agent 深度融合</h4>
                                        <p class="text-gray-600 text-m">
                                            结合端侧大模型，从传统的“脚本指令”向“智能感知-决策-执行”的自主控制体系演进。</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
    
                </div>
            </div>
        </div>
    
        <!-- 底部 -->
        <footer class="footer">
            <div class="text-gray-500 text-sm font-bold">20</div>
        </footer>
    </div>
    
    <script>
        function scaleContentToFit() {
            const sections = document.querySelectorAll('.section-container');
            sections.forEach(section => {
                const contentWrapper = section.querySelector('.scalable-content');
                const content = contentWrapper ? contentWrapper.firstElementChild : null;
                if (!contentWrapper || !content) return;
    
                contentWrapper.style.transform = 'scale(1)';
                contentWrapper.style.zoom = 1;
    
                const styles = window.getComputedStyle(section);
    
                const paddingTop = parseFloat(styles.paddingTop);
                const paddingBottom = parseFloat(styles.paddingBottom);
                const paddingLeft = parseFloat(styles.paddingLeft);
                const paddingRight = parseFloat(styles.paddingRight);
    
                const ORIGINAL_HEIGHT = section.clientHeight - paddingTop - paddingBottom;
                const ORIGINAL_WIDTH = section.clientWidth - paddingLeft - paddingRight;
                if (Math.abs(contentWrapper.scrollWidth - ORIGINAL_WIDTH) < 1 && Math.abs(contentWrapper.scrollHeight - ORIGINAL_HEIGHT) < 1) {
                    window.final_ratio = 1;
                    return;
                }
    
                const TARGET_ASPECT_RATIO = ORIGINAL_HEIGHT / ORIGINAL_WIDTH;
    
                let testWidth = ORIGINAL_WIDTH;
    
                let bestWidth = ORIGINAL_WIDTH;
                let minDifference = Infinity;
    
                for (let i = 0; i < 300; i++) {
                    testWidth = testWidth + 5;
                    content.style.width = `${testWidth}px`;
    
                    const actualHeight = content.scrollHeight;
                    const targetHeight = testWidth * TARGET_ASPECT_RATIO;
    
                    const currentDifference = Math.abs(actualHeight - targetHeight);
    
                    if (currentDifference < minDifference) {
                        minDifference = currentDifference;
                        bestWidth = testWidth;
                    }
                }
    
                content.style.width = `${bestWidth}px`;
    
                const finalWidth = content.scrollWidth;
                const finalHeight = content.scrollHeight;
    
                const scaleX = ORIGINAL_WIDTH / finalWidth;
                const scaleY = ORIGINAL_HEIGHT / finalHeight;
    
                const scaleRatio = Math.min(scaleX, scaleY);
                window.final_ratio = scaleRatio;
                contentWrapper.style.transform = 'none';
                contentWrapper.style.zoom = scaleRatio;
            });
        }
    
        window.addEventListener('load', scaleContentToFit);
        window.addEventListener('resize', scaleContentToFit);
    </script>
    </body>
    </html>
