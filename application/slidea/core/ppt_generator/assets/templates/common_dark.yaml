description: |-
    适用于市场调研、技术洞察等专业分享场合所需的PPT，深色风格
html: |-
    <!DOCTYPE html>
    <html lang="zh-CN">
    <head>
        <meta charset="utf-8"/>
        <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
        <title>总结与展望</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&amp;display=swap"
              rel="stylesheet"/>
        <script defer src="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/js/all.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <style>
            body, html {
                font-family: 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
                margin: 0;
                padding: 0;
                background-color: #f8f9fa;
            }
    
            #ppt-container {
                width: 1280px;
                height: 720px;
                display: flex;
                flex-direction: column;
                overflow: hidden;
                background-color: #1a2151;
                position: relative;
            }
    
            .section-container {
                min-height: 0;
                min-width: 0;
                padding: 0 45px;
                display: flex;
                flex-direction: column;
                flex-grow: 1;
                position: relative;
                z-index: 10;
            }
    
            .scalable-content {
                width: 100%;
                height: 100%; 
                flex-grow: 1;
                display: flex;
                flex-direction: column;
                justify-content: center;
                transform-origin: top left;
            }
    
            .header {
                height: 100px;
                padding: 20px 45px;
                display: flex;
                justify-content: space-between;
                align-items: center;
                position: relative;
                z-index: 10;
            }
    
            .footer {
                height: 50px;
                padding: 10px 45px;
                display: flex;
                justify-content: flex-end;
                align-items: center;
                position: relative;
                z-index: 10;
            }
    
            .main-title {
                font-size: 2.2rem;
                font-weight: 800;
                color: #e5e7eb;
                position: relative;
                display: inline-block;
                margin: 0;
            }
    
            .main-title:after {
                content: "";
                position: absolute;
                width: 60px;
                height: 4px;
                background-color: #3b82f6;
                bottom: -8px;
                left: 0;
            }
    
            .highlight {
                color: #facc15;
                font-weight: 700;
            }
    
            /* 1. 警告/权限 (Amber) */
            .card-amber {
                background-color: rgba(245, 158, 11, 0.15); /* amber-500 15% */
                border: 1px solid #d97706; /* amber-600 */
            }
            .text-amber-theme { color: #fbbf24; } /* amber-400 */
    
            /* 2. 正常/保活 (Emerald) */
            .card-emerald {
                background-color: rgba(16, 185, 129, 0.15); /* emerald-500 15% */
                border: 1px solid #059669; /* emerald-600 */
            }
            .text-emerald-theme { color: #34d399; } /* emerald-400 */
    
            /* 3. 交互/输入 (Purple) */
            .card-purple {
                background-color: rgba(139, 92, 246, 0.15); /* violet-500 15% */
                border: 1px solid #7c3aed; /* violet-600 */
            }
            .text-purple-theme { color: #a78bfa; } /* violet-400 */
    
            /* 4. 最佳实践 (Teal) */
            .box-teal {
                background-color: rgba(20, 184, 166, 0.1); /* teal-500 10% */
                border-left: 8px solid #14b8a6; /* teal-500 */
            }
            .text-teal-theme { color: #2dd4bf; } /* teal-400 */
    
            /* 5. 列表图标色彩 */
            .marker-cyan {
                background-color: rgba(6, 182, 212, 0.15);
                color: #22d3ee;
                border: 1px solid rgba(6, 182, 212, 0.3);
            }
            .marker-orange {
                background-color: rgba(249, 115, 22, 0.15);
                color: #fb923c;
                border: 1px solid rgba(249, 115, 22, 0.3);
            }
            .marker-rose {
                background-color: rgba(244, 63, 94, 0.15);
                color: #fb7185;
                border: 1px solid rgba(244, 63, 94, 0.3);
            }
    
            /* 通用列表图标样式 */
            .list-marker {
                width: 42px;
                height: 42px;
                border-radius: 10px;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 1.2rem;
                flex-shrink: 0;
                transition: all 0.3s ease;
            }
    
            .page-number {
                font-size: 0.9rem;
                color: #9ca3af;
            }
    
            .text-blue-main {
                color: #60a5fa;
            }
        </style>
    </head>
    <body>
    <div id="ppt-container">
    
        <!-- 背景装饰层 -->
        <div class="absolute inset-0 z-0">
            <div class="absolute top-0 right-0 w-2/5 h-full"
                 style="background-color: rgba(75, 85, 165, 0.2); clip-path: polygon(15% 0, 100% 0%, 100% 100%, 0% 100%);"></div>
        </div>
        <!-- 侧边装饰 -->
        <div class="absolute left-0 top-0 h-full w-2 bg-blue-500 z-10"></div>
    
        <!-- 头部 -->
        <header class="header">
            <h1 class="main-title">总结与展望</h1>
        </header>
    
        <div class="section-container">
            <div class="scalable-content">
                <div class="w-full flex space-x-12 h-full">
    
                    <!-- 左侧：核心结论 -->
                    <div class="h-full flex-1 flex flex-col">
                        <h2 class="text-2xl font-bold text-blue-100 mb-6 flex items-center">
                            <i class="fas fa-clipboard-check text-blue-main mr-3"></i>核心结论
                        </h2>
                        <div class="flex-1 flex flex-col justify-around">
                            <p class="text-lg text-gray-300 leading-relaxed mb-6">
                                Android 虚拟屏技术架构<span class="highlight">完全具备</span>支撑 GUI Agent
                                在后台独立运行与控制的能力，是实现非侵入式自动化的关键路径。
                            </p>
    
                            <!-- 关键要素卡片 (色彩丰富化) -->
                            <div class="mb-8">
                                <h3 class="text-m font-bold text-gray-400 mb-4">攻克三大关键技术难点：</h3>
                                <div class="flex justify-between space-x-4">
                                    <!-- 卡片1：琥珀色 (权限警告) -->
                                    <div class="flex-1 card-amber p-4 rounded text-center">
                                        <i class="fas fa-shield-alt text-3xl text-amber-theme mb-2"></i>
                                        <div class="font-bold text-gray-200">系统权限</div>
                                        <div class="text-xs text-gray-400 mt-1">System Permissions</div>
                                    </div>
                                    <!-- 卡片2：翠绿色 (保活/生命力) -->
                                    <div class="flex-1 card-emerald p-4 rounded text-center">
                                        <i class="fas fa-clone text-3xl text-emerald-theme mb-2"></i>
                                        <div class="font-bold text-gray-200">Multi-Resume</div>
                                        <div class="text-xs text-gray-400 mt-1">多屏保活机制</div>
                                    </div>
                                    <!-- 卡片3：紫色 (输入/交互) -->
                                    <div class="flex-1 card-purple p-4 rounded text-center">
                                        <i class="fas fa-hand-pointer text-3xl text-purple-theme mb-2"></i>
                                        <div class="font-bold text-gray-200">输入注入</div>
                                        <div class="text-xs text-gray-400 mt-1">Input Injection</div>
                                    </div>
                                </div>
                            </div>
    
                            <!-- 最佳实践建议 (青色高亮) -->
                            <div class="box-teal p-6 rounded">
                                <h3 class="text-lg font-bold text-teal-theme mb-2">
                                    <i class="fas fa-star mr-2"></i>最佳方案选择
                                </h3>
                                <p class="text-m text-gray-200">
                                    鉴于普通应用在虚拟屏创建和输入注入上的严格限制，<span
                                        class="text-teal-theme font-bold">系统应用 (System App)</span> 是目前实现全功能 GUI Agent 的最佳工程选择。
                                </p>
                            </div>
                        </div>
                    </div>
    
                    <!-- 右侧：未来展望 -->
                    <div class="h-full flex-1 flex flex-col">
                        <h2 class="text-2xl font-bold text-blue-100 mb-6 flex items-center">
                            <i class="fas fa-binoculars text-blue-main mr-3"></i>未来展望
                        </h2>
    
                        <div class="h-full flex-1 flex flex-col justify-around">
    
                            <!-- 图片素材 (边框改为低调的灰色以突出内容) -->
                            <div class="w-full mb-8">
                                <img src="images/6cab708fa289b77ea12333f1978bbb90.png" alt="Android 14 Future"
                                     class="w-full h-auto object-contain max-h-56 rounded border border-gray-600 opacity-90">
                            </div>
    
                            <div class="flex-1 flex flex-col justify-around">
                                <!-- 展望点 1 (青色/科技) -->
                                <div class="flex items-start">
                                    <div class="list-marker marker-cyan mr-4">
                                        <i class="fas fa-laptop-code"></i>
                                    </div>
                                    <div>
                                        <h4 class="text-lg font-bold text-gray-200">系统 API 演进 (Android 14+)</h4>
                                        <p class="text-gray-400 mt-1 text-m">系统可能进一步开放虚拟屏与多窗口管理
                                            API，降低非系统级应用的实现门槛。</p>
                                    </div>
                                </div>
    
                                <!-- 展望点 2 (橙色/活力/定制) -->
                                <div class="flex items-start">
                                    <div class="list-marker marker-orange mr-4">
                                        <i class="fas fa-sliders-h"></i>
                                    </div>
                                    <div>
                                        <h4 class="text-lg font-bold text-gray-200">厂商定制化支持</h4>
                                        <p class="text-gray-400 mt-1 text-m">各厂商 ROM
                                            可能针对“后台自动化”场景推出特定的特权模式或管控接口。</p>
                                    </div>
                                </div>
    
                                <!-- 展望点 3 (玫红/AI/未来) -->
                                <div class="flex items-start">
                                    <div class="list-marker marker-rose mr-4">
                                        <i class="fas fa-brain"></i>
                                    </div>
                                    <div>
                                        <h4 class="text-lg font-bold text-gray-200">AI Agent 深度融合</h4>
                                        <p class="text-gray-400 mt-1 text-m">
                                            结合端侧大模型，从传统的“脚本指令”向“智能感知-决策-执行”的自主控制体系演进。</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
    
                </div>
            </div>
        </div>
    
        <!-- 底部 -->
        <footer class="footer">
            <div class="page-number">20</div>
        </footer>
    </div>
    
    <script>
        function scaleContentToFit() {
            const sections = document.querySelectorAll('.section-container');
            sections.forEach(section => {
                const contentWrapper = section.querySelector('.scalable-content');
                const content = contentWrapper ? contentWrapper.firstElementChild : null;
                if (!contentWrapper || !content) return;
    
                contentWrapper.style.transform = 'scale(1)';
                contentWrapper.style.zoom = 1;
    
                const styles = window.getComputedStyle(section);
    
                const paddingTop = parseFloat(styles.paddingTop);
                const paddingBottom = parseFloat(styles.paddingBottom);
                const paddingLeft = parseFloat(styles.paddingLeft);
                const paddingRight = parseFloat(styles.paddingRight);
    
                const ORIGINAL_HEIGHT = section.clientHeight - paddingTop - paddingBottom;
                const ORIGINAL_WIDTH = section.clientWidth - paddingLeft - paddingRight;
                if (Math.abs(contentWrapper.scrollWidth - ORIGINAL_WIDTH) < 1 && Math.abs(contentWrapper.scrollHeight - ORIGINAL_HEIGHT) < 1) {
                    window.final_ration = 1;
                    return;
                }
    
                const TARGET_ASPECT_RATIO = ORIGINAL_HEIGHT / ORIGINAL_WIDTH;
    
                let testWidth = ORIGINAL_WIDTH;
    
                let bestWidth = ORIGINAL_WIDTH;
                let minDifference = Infinity;
    
                for (let i = 0; i < 300; i++) {
                    testWidth = testWidth + 5;
                    content.style.width = `${testWidth}px`;
    
                    const actualHeight = content.scrollHeight;
                    const targetHeight = testWidth * TARGET_ASPECT_RATIO;
    
                    const currentDifference = Math.abs(actualHeight - targetHeight);
    
                    if (currentDifference < minDifference) {
                        minDifference = currentDifference;
                        bestWidth = testWidth;
                    }
                }
    
                content.style.width = `${bestWidth}px`;
    
                const finalWidth = content.scrollWidth;
                const finalHeight = content.scrollHeight;
    
                const scaleX = ORIGINAL_WIDTH / finalWidth;
                const scaleY = ORIGINAL_HEIGHT / finalHeight;
    
                const scaleRatio = Math.min(scaleX, scaleY);
                window.final_ration = scaleRatio;
                contentWrapper.style.transform = 'none';
                contentWrapper.style.zoom = scaleRatio;
            });
        }
    
        window.addEventListener('load', scaleContentToFit);
        window.addEventListener('resize', scaleContentToFit);
    </script>
    </body>
    </html>
