description: |-
    适用于市场调研、技术洞察等专业分享场合所需的PPT，浅色风格
html: |-
    <!DOCTYPE html>
    <html lang="zh-CN">
    <head>
        <meta charset="utf-8"/>
        <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
        <title>总结与展望</title>
        <script src="https://cdn.jsdmirror.com/npm/tailwindcss-cdn@3.4.10/tailwindcss.js"></script>
        <link href="https://fonts.googleapis.cn/css2?family=Noto+Sans+SC:wght@400;700&amp;display=swap" rel="stylesheet"/>
        <script defer src="https://cdn.jsdelivr.net.cn/npm/@fortawesome/fontawesome-free@6.4.0/js/all.min.js"></script>
        <script src="https://cdn.jsdelivr.net.cn/npm/chart.js"></script>
        <style>
            body, html {
                font-family: 'Noto Sans SC', sans-serif;
                margin: 0;
                padding: 0;
                background-color: #ffffff;
            }
    
            #ppt-container {
                width: 1280px;
                height: 720px;
                display: grid;
                grid-template-rows: 100px 1fr 50px;
                background-color: #f8fafc;
                border-left: 8px solid #3b82f6;
                position: relative;
                overflow: hidden;
            }

            .bg-split-accent {
                grid-row: 1 / 4;
                grid-column: 1;
                justify-self: end;
                width: 42%;
                height: 100%;
                background-color: #e8eef6;
                clip-path: polygon(18% 0, 100% 0, 100% 100%, 0 100%);
                z-index: 0;
            }
    
            .section-container {
                min-height: 0;
                min-width: 0;
                padding: 0 45px;
                display: flex;
                flex-direction: column;
                flex-grow: 1;
                grid-row: 2;
                grid-column: 1;
                position: relative;
                z-index: 10;
            }
    
            .scalable-content {
                width: 100%;
                height: 100%; 
                flex-grow: 1;
                display: flex;
                flex-direction: column;
                justify-content: center;
                transform-origin: top left;
            }
    
            .header {
                height: 100px;
                padding: 20px 45px;
                display: flex;
                justify-content: space-between;
                align-items: center;
                grid-row: 1;
                grid-column: 1;
                position: relative;
                z-index: 10;
            }
    
            .footer {
                height: 50px;
                padding: 10px 45px;
                display: flex;
                justify-content: flex-end;
                align-items: center;
                grid-row: 3;
                grid-column: 1;
                position: relative;
                z-index: 10;
            }
    
            .main-title {
                font-size: 2.2rem;
                font-weight: 800;
                color: #1e293b;
                display: inline-block;
                margin: 0;
                padding-bottom: 0.5rem;
                border-bottom: 4px solid #2563eb;
            }
    
            .highlight {
                color: #0ea5e9;
                font-weight: 700;
            }
    
            .card-amber {
                background-color: #fffbeb;
                border: 1px solid #fbbf24;
                color: #b45309;
            }
    
            .card-emerald {
                background-color: #ecfdf5;
                border: 1px solid #34d399;
                color: #047857;
            }
    
            .card-violet {
                background-color: #f5f3ff;
                border: 1px solid #a78bfa;
                color: #6d28d9;
            }
    
            .box-teal {
                background-color: #f0fdfa;
                border-left: 6px solid #0d9488;
            }
            .text-teal-theme { color: #0f766e; }
    
            .list-marker {
                width: 42px;
                height: 42px;
                border-radius: 10px;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 1.2rem;
                flex-shrink: 0;
                transition: all 0.3s ease;
            }
    
            .marker-sky {
                background-color: #e0f2fe;
                color: #0284c7;
                border: 1px solid #bae6fd;
            }
            .marker-orange {
                background-color: #ffedd5;
                color: #ea580c;
                border: 1px solid #fed7aa;
            }
            .marker-rose {
                background-color: #ffe4e6;
                color: #e11d48;
                border: 1px solid #fecdd3;
            }
    
            .page-number {
                font-size: 0.9rem;
                color: #94a3b8;
            }
        </style>
    </head>
    <body>
    <div id="ppt-container">
        <div class="bg-split-accent"></div>
    
        <header class="header">
            <h1 class="main-title">总结与展望</h1>
        </header>
    
        <div class="section-container">
            <div class="scalable-content">
                <div class="w-full flex space-x-12 h-full">
    
                    <div class="h-full flex-1 flex flex-col">
                        <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center">
                            <i class="fas fa-clipboard-check text-blue-600 mr-3"></i>核心结论
                        </h2>
                        <div class="flex-1 flex flex-col justify-around">
                            <p class="text-lg text-gray-600 leading-relaxed mb-6">
                                Android 虚拟屏技术架构<span class="highlight">完全具备</span>支撑 GUI Agent
                                在后台独立运行与控制的能力，是实现非侵入式自动化的关键路径。
                            </p>
    
                            <div class="mb-8">
                                <h3 class="text-m font-bold text-gray-500 mb-4">攻克三大关键技术难点：</h3>
                                <div class="flex justify-between space-x-4">
                                    <div class="flex-1 card-amber p-4 rounded text-center">
                                        <i class="fas fa-shield-alt text-3xl mb-2"></i>
                                        <div class="font-bold mb-1">系统权限</div>
                                        <div class="text-xs text-gray-500">System Permissions</div>
                                    </div>
                                    <div class="flex-1 card-emerald p-4 rounded text-center">
                                        <i class="fas fa-clone text-3xl mb-2"></i>
                                        <div class="font-bold mb-1">Multi-Resume</div>
                                        <div class="text-xs text-gray-500">多屏保活机制</div>
                                    </div>
                                    <div class="flex-1 card-violet p-4 rounded text-center">
                                        <i class="fas fa-hand-pointer text-3xl mb-2"></i>
                                        <div class="font-bold mb-1">输入注入</div>
                                        <div class="text-xs text-gray-500">Input Injection</div>
                                    </div>
                                </div>
                            </div>
    
                            <div class="box-teal p-6 rounded">
                                <h3 class="text-lg font-bold text-teal-theme mb-2">
                                    <i class="fas fa-star mr-2"></i>最佳方案选择
                                </h3>
                                <p class="text-m text-gray-700">
                                    鉴于普通应用在虚拟屏创建和输入注入上的严格限制，<span
                                        class="text-teal-theme font-bold">系统应用 (System App)</span> 是目前实现全功能 GUI Agent 的最佳工程选择。
                                </p>
                            </div>
                        </div>
                    </div>
    
                    <div class="h-full flex-1 flex flex-col">
                        <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center">
                            <i class="fas fa-binoculars text-blue-600 mr-3"></i>未来展望
                        </h2>
    
                        <div class="h-full flex-1 flex flex-col justify-around">
    
                            <div class="w-full mb-8">
                                <img src="images/6cab708fa289b77ea12333f1978bbb90.png" alt="Android 14 Future"
                                     class="w-full h-auto object-contain max-h-56 rounded border border-gray-200">
                            </div>
    
                            <div class="flex-1 flex flex-col justify-around">
                                <div class="flex items-start">
                                    <div class="list-marker marker-sky mr-4">
                                        <i class="fas fa-laptop-code"></i>
                                    </div>
                                    <div>
                                        <h4 class="text-lg font-bold text-gray-700 mb-1">系统 API 演进 (Android 14+)</h4>
                                        <p class="text-gray-500 text-m">系统可能进一步开放虚拟屏与多窗口管理
                                            API，降低非系统级应用的实现门槛。</p>
                                    </div>
                                </div>
    
                                <div class="flex items-start">
                                    <div class="list-marker marker-orange mr-4">
                                        <i class="fas fa-sliders-h"></i>
                                    </div>
                                    <div>
                                        <h4 class="text-lg font-bold text-gray-700 mb-1">厂商定制化支持</h4>
                                        <p class="text-gray-500 text-m">各厂商 ROM
                                            可能针对“后台自动化”场景推出特定的特权模式或管控接口。</p>
                                    </div>
                                </div>
    
                                <div class="flex items-start">
                                    <div class="list-marker marker-rose mr-4">
                                        <i class="fas fa-brain"></i>
                                    </div>
                                    <div>
                                        <h4 class="text-lg font-bold text-gray-700 mb-1">AI Agent 深度融合</h4>
                                        <p class="text-gray-500 text-m">
                                            结合端侧大模型，从传统的“脚本指令”向“智能感知-决策-执行”的自主控制体系演进。</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
    
                </div>
            </div>
        </div>
    
        <footer class="footer">
            <div class="page-number">20</div>
        </footer>
    </div>
    
    <script>
        function scaleContentToFit() {
            const sections = document.querySelectorAll('.section-container');
            sections.forEach(section => {
                const contentWrapper = section.querySelector('.scalable-content');
                const content = contentWrapper ? contentWrapper.firstElementChild : null;
                if (!contentWrapper || !content) return;
    
                contentWrapper.style.transform = 'scale(1)';
                contentWrapper.style.zoom = 1;
    
                const styles = window.getComputedStyle(section);
    
                const paddingTop = parseFloat(styles.paddingTop);
                const paddingBottom = parseFloat(styles.paddingBottom);
                const paddingLeft = parseFloat(styles.paddingLeft);
                const paddingRight = parseFloat(styles.paddingRight);
    
                const ORIGINAL_HEIGHT = section.clientHeight - paddingTop - paddingBottom;
                const ORIGINAL_WIDTH = section.clientWidth - paddingLeft - paddingRight;
                if (Math.abs(contentWrapper.scrollWidth - ORIGINAL_WIDTH) < 1 && Math.abs(contentWrapper.scrollHeight - ORIGINAL_HEIGHT) < 1) {
                    window.final_ratio = 1;
                    return;
                }
    
                const TARGET_ASPECT_RATIO = ORIGINAL_HEIGHT / ORIGINAL_WIDTH;
    
                let testWidth = ORIGINAL_WIDTH;
    
                let bestWidth = ORIGINAL_WIDTH;
                let minDifference = Infinity;
    
                for (let i = 0; i < 300; i++) {
                    testWidth = testWidth + 5;
                    content.style.width = `${testWidth}px`;
    
                    const actualHeight = content.scrollHeight;
                    const targetHeight = testWidth * TARGET_ASPECT_RATIO;
    
                    const currentDifference = Math.abs(actualHeight - targetHeight);
    
                    if (currentDifference < minDifference) {
                        minDifference = currentDifference;
                        bestWidth = testWidth;
                    }
                }
    
                content.style.width = `${bestWidth}px`;
    
                const finalWidth = content.scrollWidth;
                const finalHeight = content.scrollHeight;
    
                const scaleX = ORIGINAL_WIDTH / finalWidth;
                const scaleY = ORIGINAL_HEIGHT / finalHeight;
    
                const scaleRatio = Math.min(scaleX, scaleY);
                window.final_ratio = scaleRatio;
                contentWrapper.style.transform = 'none';
                contentWrapper.style.zoom = scaleRatio;
            });
        }
    
        window.addEventListener('load', scaleContentToFit);
        window.addEventListener('resize', scaleContentToFit);
    </script>
    </body>
    </html>
